<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Relic Runner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <h1>Relic Runner</h1>
    <p class="tagline">Grab relics. Dodge ghosts. Become archaeology.</p>

    <section class="hud" aria-label="game stats">
      <span>Runes: <strong id="score">0</strong></span>
      <span>Next: <strong id="next-level">0/3</strong></span>
      <span>Health: <strong id="health">9/9</strong></span>
      <span>Level: <strong id="level">1</strong></span>
      <span>Speed: <strong id="speed">1.00x</strong></span>
      <span>Damage: <strong id="damage">1</strong></span>
    </section>

    <canvas id="game" width="1600" height="1000" aria-label="Relic Runner game canvas"></canvas>

    <section class="controls">
      <p>Move with <strong>WASD</strong> or <strong>Arrow Keys</strong>. Aim with the mouse. <strong>Space</strong> slings stones. <strong>Shift</strong> fires buckshot.</p>
      <button id="restart">Restart</button>
    </section>
  </main>

  <script type="module" src="game.js?v=big-hud-contact-1"></script>
</body>
</html>
